name: Update data

on:
  schedule:
    - cron: "20 16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ingest deps
        run: npm --prefix ingest install

      - name: Run ingest
        run: npm --prefix ingest run run

      - name: Mirror data to public
        run: |
          mkdir -p public
          cp data/latest.json public/latest.json
          cp data/history.json public/history.json

      - name: Commit changes
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/latest.json data/history.json
          git commit -m "chore: update data" || exit 0
          git push
